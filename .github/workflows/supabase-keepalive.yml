name: Supabase Keep-Alive

# Pings the Supabase REST API on a schedule so the free-tier project
# doesn't get auto-paused after 7 days of inactivity.
# Remove this workflow once the project is on Supabase Pro.

on:
  schedule:
    - cron: '0 9 */3 * *'   # every 3 days at 09:00 UTC
  workflow_dispatch:         # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sS -f \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/site_content?select=page&limit=1"
