name: Supabase Keep-Alive

# Pings Supabase on a schedule so the free-tier project doesn't get
# auto-paused after 7 days of inactivity. Uses a cache-busting query
# param + hits two endpoints (REST + auth) because a plain GET may be
# served from Supabase's CDN and not count as activity against the
# pause timer.
# Remove this workflow once the project is on Supabase Pro.

on:
  schedule:
    - cron: '0 9 */2 * *'   # every 2 days at 09:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (cache-busted)
        run: |
          curl -sS -f \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Cache-Control: no-cache" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/site_content?select=page&limit=1&t=$(date +%s)"

      - name: Ping Supabase Auth
        run: |
          curl -sS -f \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/auth/v1/settings"
